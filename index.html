<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kickin">

  <!-- PhonePe JS (non-blocking) -->
  <script src="https://mercury.phonepe.com/web/bundle/checkout.js" defer></script>
  <script>
    window.checkout = (tokenUrl, type, callback) => {
      if (window && window.PhonePeCheckout && window.PhonePeCheckout.transact) {
        window.PhonePeCheckout.transact({ tokenUrl, callback, type });
      }
    }
  </script>

  <!-- Favicon -->
  <link rel="icon" href="https://grbbdskhtdettoddpxfl.supabase.co/storage/v1/object/public/storage/assest/Kickin%20Logo.svg" sizes="any" />

  <!-- Open Graph & SEO -->
  <meta property="og:title" content="Kickin – Football. Community. Careers." />
  <meta property="og:description" content="Whether you’re a player, organizer, or coach – Kickin gives you tools and a network to grow in football, together." />
  <meta property="og:image" content="https://grbbdskhtdettoddpxfl.supabase.co/storage/v1/object/public/storage/assest/Kickin%20Logo.svg" />
  <meta name="twitter:title" content="Kickin – Football. Community. Careers." />
  <meta name="twitter:description" content="Whether you’re a player, organizer, or coach – Kickin gives you tools and a network to grow in football, together." />
  <meta name="twitter:image" content="https://grbbdskhtdettoddpxfl.supabase.co/storage/v1/object/public/storage/assest/Kickin%20Logo.svg" />
  <meta name="twitter:card" content="summary_large_image" />

  <title>Kickin – Football. Community. Careers.</title>
  <meta name="description" content="Whether you’re a player, organizer, or coach – Kickin gives you tools and a network to grow in football, together." />

  <link rel="manifest" href="manifest.json">
</head>

<body style="margin: 0; padding: 0; background: #14161C;">

  <!-- ✅ Loading screen with logo -->
  <div id="loading-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#14161C; display:flex; align-items:center; justify-content:center; z-index:9999;">
    <img src="https://grbbdskhtdettoddpxfl.supabase.co/storage/v1/object/public/storage/assest/Kickin%20Logo.svg" alt="Kickin Logo" style="height: 120px;" />
  </div>

  <!-- ✅ Google Maps if used -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDscP9ySrva9sSuXCYTF--BtQL-YCxgyFA"></script>

  <!-- ✅ Flutter Loader Configuration -->
  <script>
    if (!window._flutter) {
      window._flutter = {};
    }

    _flutter.buildConfig = {
      engineRevision: "cf56914b326edb0ccb123ffdc60f00060bd513fa",
      builds: [{
        compileTarget: "dart2js",
        renderer: "canvaskit",
        mainJsPath: "main.dart.js"
      }]
    };

    // Load Flutter app asynchronously
    (async () => {
      await window._flutter.loader.load({
        onEntrypointLoaded: async function (engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine({ useColorEmoji: true });
          await appRunner.runApp();

          // ✅ Hide loader once Flutter app is ready
          const loadingEl = document.getElementById('loading-screen');
          if (loadingEl) loadingEl.style.display = 'none';
        }
      });
    })();
  </script>

</body>
</html>
